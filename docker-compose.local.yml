version: '3.8'

# Local development Docker Compose
# Usage: docker-compose -f docker-compose.local.yml up --build

services:
  minio:
    image: minio/minio
    container_name: granitalent-minio-local
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc
    container_name: granitalent-minio-init-local
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/granitalent --ignore-existing;
      exit 0;
      "

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: granitalent-backend-local
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      - DATA_DIR=/app/data
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY_ID=minioadmin
      - S3_SECRET_ACCESS_KEY=minioadmin
      - S3_BUCKET_NAME=granitalent
      - S3_REGION=us-east-1
    volumes:
      - db-data:/app/data
      - ./logs:/app/logs
    depends_on:
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: granitalent-frontend-local
    ports:
      - "3034:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db-data:
  minio-data:
