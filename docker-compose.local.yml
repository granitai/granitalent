version: '3.8'

# Local development Docker Compose
# Usage: docker-compose -f docker-compose.local.yml up --build

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: granitalent-backend-local
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      - DATA_DIR=/app/data
    volumes:
      - db-data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: granitalent-frontend-local
    ports:
      - "3034:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db-data:
