# Production Docker Compose for VPS deployment
# Uses the existing Traefik reverse proxy on the "proxy" network
# Usage: docker-compose -f docker-compose.prod.yml up -d --build

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: granitalent-backend
    expose:
      - "8000"
    env_file:
      - backend/.env
    environment:
      - DATA_DIR=/app/data
    volumes:
      - db-data:/app/data
      - ./logs:/app/logs
      - uploads-data:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - proxy
      - internal
    labels:
      - "traefik.enable=true"
      # API routes
      - "traefik.http.routers.granitalent-api.rule=Host(`talents.granitai.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.granitalent-api.entrypoints=websecure"
      - "traefik.http.routers.granitalent-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.granitalent-api.loadbalancer.server.port=8000"
      # WebSocket route
      - "traefik.http.routers.granitalent-ws.rule=Host(`talents.granitai.com`) && PathPrefix(`/ws`)"
      - "traefik.http.routers.granitalent-ws.entrypoints=websecure"
      - "traefik.http.routers.granitalent-ws.tls.certresolver=letsencrypt"
      - "traefik.http.services.granitalent-ws.loadbalancer.server.port=8000"
      # Uploads route
      - "traefik.http.routers.granitalent-uploads.rule=Host(`talents.granitai.com`) && PathPrefix(`/uploads`)"
      - "traefik.http.routers.granitalent-uploads.entrypoints=websecure"
      - "traefik.http.routers.granitalent-uploads.tls.certresolver=letsencrypt"
      - "traefik.http.services.granitalent-uploads.loadbalancer.server.port=8000"
      # API docs route
      - "traefik.http.routers.granitalent-docs.rule=Host(`talents.granitai.com`) && PathPrefix(`/docs`, `/openapi.json`)"
      - "traefik.http.routers.granitalent-docs.entrypoints=websecure"
      - "traefik.http.routers.granitalent-docs.tls.certresolver=letsencrypt"
      - "traefik.http.services.granitalent-docs.loadbalancer.server.port=8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: granitalent-frontend
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - proxy
      - internal
    labels:
      - "traefik.enable=true"
      # Frontend catch-all (lowest priority)
      - "traefik.http.routers.granitalent-frontend.rule=Host(`talents.granitai.com`)"
      - "traefik.http.routers.granitalent-frontend.entrypoints=websecure"
      - "traefik.http.routers.granitalent-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.granitalent-frontend.priority=1"
      - "traefik.http.services.granitalent-frontend.loadbalancer.server.port=80"

volumes:
  db-data:
  uploads-data:

networks:
  proxy:
    external: true
  internal:
    driver: bridge
