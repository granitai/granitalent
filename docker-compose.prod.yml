# Production Docker Compose for VPS deployment
# Uses the existing Traefik reverse proxy on the "proxy" network
# Usage: docker-compose -f docker-compose.prod.yml up -d --build
#
# S3 STORAGE:
# By default, uses a self-hosted MinIO instance.
# To switch to a cloud provider (AWS S3, Cloudflare R2, Backblaze B2),
# remove the minio/minio-init services and set S3_* env vars in backend/.env
# pointing to your cloud bucket.

services:
  minio:
    image: minio/minio
    container_name: granitalent-minio
    command: server /data --console-address ":9001"
    expose:
      - "9000"
      - "9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  minio-init:
    image: minio/mc
    container_name: granitalent-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb local/granitalent --ignore-existing;
      exit 0;
      "
    networks:
      - internal

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: granitalent-backend
    expose:
      - "8000"
    env_file:
      - backend/.env
    environment:
      - DATA_DIR=/app/data
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minioadmin}
      - S3_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - S3_BUCKET_NAME=granitalent
      - S3_REGION=us-east-1
    volumes:
      - db-data:/app/data
      - ./logs:/app/logs
    depends_on:
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - proxy
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      # Single service definition for all backend routers
      - "traefik.http.services.granitalent-backend.loadbalancer.server.port=8000"
      # API routes
      - "traefik.http.routers.granitalent-api.rule=Host(`talents.granitai.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.granitalent-api.entrypoints=websecure"
      - "traefik.http.routers.granitalent-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.granitalent-api.service=granitalent-backend"
      # WebSocket route
      - "traefik.http.routers.granitalent-ws.rule=Host(`talents.granitai.com`) && PathPrefix(`/ws`)"
      - "traefik.http.routers.granitalent-ws.entrypoints=websecure"
      - "traefik.http.routers.granitalent-ws.tls.certresolver=letsencrypt"
      - "traefik.http.routers.granitalent-ws.service=granitalent-backend"
      # Uploads route
      - "traefik.http.routers.granitalent-uploads.rule=Host(`talents.granitai.com`) && PathPrefix(`/uploads`)"
      - "traefik.http.routers.granitalent-uploads.entrypoints=websecure"
      - "traefik.http.routers.granitalent-uploads.tls.certresolver=letsencrypt"
      - "traefik.http.routers.granitalent-uploads.service=granitalent-backend"
      # API docs route
      - "traefik.http.routers.granitalent-docs.rule=Host(`talents.granitai.com`) && PathPrefix(`/docs`, `/openapi.json`)"
      - "traefik.http.routers.granitalent-docs.entrypoints=websecure"
      - "traefik.http.routers.granitalent-docs.tls.certresolver=letsencrypt"
      - "traefik.http.routers.granitalent-docs.service=granitalent-backend"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: granitalent-frontend
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - proxy
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      # Frontend catch-all (lowest priority)
      - "traefik.http.routers.granitalent-frontend.rule=Host(`talents.granitai.com`)"
      - "traefik.http.routers.granitalent-frontend.entrypoints=websecure"
      - "traefik.http.routers.granitalent-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.granitalent-frontend.priority=1"
      - "traefik.http.services.granitalent-frontend.loadbalancer.server.port=80"

volumes:
  db-data:
  minio-data:

networks:
  proxy:
    external: true
  internal:
    driver: bridge
